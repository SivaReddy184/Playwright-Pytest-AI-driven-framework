name: AI Playwright Framework – CI

# Trigger on every PR merge into main and on direct pushes to main
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]   # runs when PR is merged

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    # For PR events, only run when actually merged (not just closed)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    env:
      #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      BASE_URL: ${{ vars.BASE_URL }}
      BROWSER: ${{ vars.BROWSER }}
      HEADLESS: ${{ vars.HEADLESS }}
      STANDARD_USER: ${{ vars.STANDARD_USER }}
      SELF_HEALING_ENABLED: "true"

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Playwright browsers ───────────────────────────────────
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # ── Create required directories ───────────────────────────
      - name: Create output directories
        run: mkdir -p reports/allure-results logs

      # ── Smoke tests first ─────────────────────────────────────
      - name: Run smoke tests
        env:
          #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          HEADLESS: "true"
          SELF_HEALING_ENABLED: "true"
        run: |
          pytest tests/ -m smoke -v --alluredir=reports/allure-results --tb=short
        continue-on-error: false

      # ── Full regression suite ─────────────────────────────────
      - name: Run regression tests
        env:
          #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
          HEADLESS: "true"
          SELF_HEALING_ENABLED: "true"
        run: |
          pytest tests/ -m regression -v --alluredir=reports/allure-results --tb=short
        continue-on-error: true

      # ── Upload Allure results as artifact ─────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 14

      # ── Upload test logs ──────────────────────────────────────
      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      # ── Publish Allure report to GitHub Pages ─────────────────
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: reports/allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
