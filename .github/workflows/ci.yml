name: AI Playwright Framework – CI

# Trigger on every PR merge into main and on direct pushes to main
on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - dev
      headless:
        description: 'Run in headless mode?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      marker:
        description: 'Pytest marker to run (smoke/regression/leave empty to run all tests)'
        required: false
        default: 'smoke'
        type: string

  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]   # runs when PR is merged
  schedule:
    - cron: '0 4 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write             # needed to push to gh-pages branch
    # For PR events, only run when actually merged (not just closed)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    env:
      #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      #BASE_URL:  ${{ github.event.inputs.environment == 'staging' && vars.PROD_URL || github.event.inputs.environment == 'dev' && vars.DEV_URL || vars.BASE_URL || 'https://www.saucedemo.com' }}
      BASE_URL: ${{ vars.BASE_URL }}
      BROWSER: ${{ github.event.inputs.browser || vars.BROWSER || 'chromium' }}
      HEADLESS: ${{ github.event.inputs.headless || vars.HEADLESS || 'true' }}
      STANDARD_USER: ${{ vars.STANDARD_USER }}
      SELF_HEALING_ENABLED: "true"

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencies ──────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Playwright browsers ───────────────────────────────────
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      # ── Create required directories ───────────────────────────
      - name: Create output directories
        run: mkdir -p reports/allure-results logs

      # ── Smoke tests first ─────────────────────────────────────
#      - name: Run smoke tests
#        env:
#          #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#          BASE_URL: ${{ vars.BASE_URL || 'https://rahulshettyacademy.com/client/#/auth/login' }}
#          HEADLESS: "true"
#          SELF_HEALING_ENABLED: "true"
#        run: |
#          pytest tests/ -m smoke -v --alluredir=reports/allure-results --tb=short
#        continue-on-error: false

      - name: Run smoke tests
          # Skip this step if user manually chose regression marker
        if: github.event.inputs.marker != 'regression'
        run: |
          pytest tests/ -m smoke -v --alluredir=reports/allure-results --tb=short

      # ── Regression tests ─────────────────────────────────────
      - name: Run regression tests
        if: github.event.inputs.marker != 'smoke'
        run: |
          pytest tests/ -m regression -v --alluredir=reports/allure-results --tb=short
          exit_code=$?
          if [ $exit_code -eq 5 ]; then
            echo "No regression tests found - skipping gracefully"
            exit 0
          fi
          exit $exit_code
        continue-on-error: true

      # ── Full regression suite ─────────────────────────────────
#      - name: Run regression tests
#        env:
#          #ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
#          HEADLESS: "true"
#          SELF_HEALING_ENABLED: "true"
#        run: |
#          pytest tests/ -m regression -v --alluredir=reports/allure-results --tb=short
#        continue-on-error: true
#      - name: Run regression tests
#        run: |
#          pytest tests/ -m regression -v --alluredir=reports/allure-results --tb=short
#          exit_code=$?
#          if [ $exit_code -eq 5 ]; then
#            echo "No regression tests collected - skipping"
#            exit 0
#          fi
#          exit $exit_code
#        continue-on-error: false

      # ── Install Allure CLI (no Docker) ────────────────────────
      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.32.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── Get Allure history from gh-pages ─────────────────────
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # ── Copy history into results for trend graphs ────────────
      - name: Copy Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history reports/allure-results/history
            echo "History copied successfully"
          else
            echo "No previous history found - first run"
          fi

      # ── Generate Allure HTML report ───────────────────────────
      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate reports/allure-results --clean -o reports/allure-html
          echo "Allure report generated successfully"

      # ── Upload Allure results as artifact ─────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: reports/allure-results/
          retention-days: 14

      # ── Upload Allure HTML report as artifact ─────────────────
      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-html-report-${{ github.run_number }}
          path: reports/allure-html/
          retention-days: 14

      # ── Upload logs ───────────────────────────────────────────
      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      # ── Deploy to GitHub Pages ────────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: reports/allure-html
